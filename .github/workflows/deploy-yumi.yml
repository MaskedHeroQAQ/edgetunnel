name: Deploy yumi Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "_worker.js"
      - "img.png"
      - "wrangler.toml"
      - ".github/workflows/deploy-yumi.yml"
  workflow_run:
    workflows: ["Upstream Sync"]
    types: [completed]

concurrency:
  group: deploy-yumi-pages
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_PROJECT_NAME: yumi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare Pages bundle
        run: |
          set -euo pipefail
          rm -rf .pages-bundle
          mkdir .pages-bundle
          cp _worker.js .pages-bundle/_worker.js
          if [ -f img.png ]; then
            cp img.png .pages-bundle/img.png
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing Cloudflare deployment secrets."
            exit 1
          fi
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          COMMIT_HASH="$(git rev-parse HEAD)"
          npx wrangler@latest pages deploy .pages-bundle \
            --project-name="$PAGES_PROJECT_NAME" \
            --branch=main \
            --commit-hash="$COMMIT_HASH" \
            --commit-message="$COMMIT_MESSAGE"
